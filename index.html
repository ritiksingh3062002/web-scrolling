<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Net Scroll | Clone Yourself</title>
    <meta name="description" content="Infinite 3D grid tunnel scroll effect.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #ff4d4d;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            /* We handle scroll via JS events */
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            /* Let clicks pass through to 3D if needed */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hero-text {
            text-align: center;
            color: var(--text-color);
            /* Mix blend mode can look cool but might affect legibility depending on bg */
            /* mix-blend-mode: difference; */
        }

        h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.9;
            margin: 0;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 20px auto 0;
            color: #555;
            font-weight: 400;
        }

        .highlight {
            color: var(--accent-color);
            position: relative;
            display: inline-block;
        }

        /* Interactive buttons */
        .cta-container {
            margin-top: 40px;
            pointer-events: auto;
            /* Re-enable clicks */
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        .btn {
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .btn-primary {
            background-color: #000;
            color: #fff;
            border: 2px solid #000;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-secondary {
            background-color: transparent;
            color: #000;
            border: none;
        }

        .btn-secondary:hover {
            text-decoration: underline;
        }

        /* Scroll indicator */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: #888;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            40% {
                transform: translateX(-50%) translateY(-10px);
            }

            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        /* Loading overlay */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            transition: opacity 0.5s ease;
        }
    </style>
    <!-- Three.js CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>

<body>
    <div id="loader">Loading Experience...</div>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div class="hero-text">
            <h1>Clone<br>yourself.</h1>
            <p>Build the digital version of you to scale your expertise and availability, <span
                    class="highlight">infinitely</span>.</p>

            <div class="cta-container">
                <a href="#" class="btn btn-primary">Try now</a>
                <a href="#" class="btn btn-secondary">See examples &rarr;</a>
            </div>
        </div>
        <div class="scroll-hint">Scroll to explore</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- CONFIGURATION ---
        const CONFIG = {
            tunnelSize: 8,          // Width/Height of the tunnel
            tunnelLength: 8,         // Length of one segment
            segments: 16,            // Number of segments to render at once
            speed: 0.05,             // Base movement speed
            scrollMultiplier: 0.015, // How much scroll affects speed
            rotationSpeed: 0.002,    // Rotation per unit of movement
            fogDensity: 0.08,
            imageScale: 3,           // Size of images on walls
        };

        // --- STATE ---
        const state = {
            scrollPos: 0,
            targetScrollPos: 0,
            cameraZ: 0,
            mouseX: 0,
            mouseY: 0,
            targetMouseX: 0,
            targetMouseY: 0,
            time: 0
        };

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.FogExp2(0xffffff, CONFIG.fogDensity);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- ASSETS / TEXTURES ---
        // Generating procedural textures to avoid external dependencies issues and ensure high availability
        function createGradientTexture(id) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 768; // Portrait aspect
            const ctx = canvas.getContext('2d');

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, 512, 768);
            const hue = (id * 67) % 360;
            gradient.addColorStop(0, `hsl(${hue}, 80%, 70%)`);
            gradient.addColorStop(1, `hsl(${hue + 40}, 80%, 50%)`);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 768);

            // abstract shapes
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath();
            ctx.arc(Math.random() * 512, Math.random() * 768, 100 + Math.random() * 100, 0, Math.PI * 2);
            ctx.fill();

            // Text overlay simulates "content"
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 80px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`USER ${id + 1}`, 256, 384);

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        const textures = Array.from({ length: 8 }, (_, i) => createGradientTexture(i));

        // --- GEOMETRY ---
        // We build the tunnel using a group of segments.
        // Each segment is a square wireframe + potentially an image mesh.

        const tunnelGroup = new THREE.Group();
        scene.add(tunnelGroup);

        const materialLine = new THREE.LineBasicMaterial({ color: 0xcccccc }); // Light grey grid

        // Create a reusable geometry for one square segment frame
        const framePoints = [];
        const hw = CONFIG.tunnelSize / 2; // half width
        // A square: TopLeft -> TopRight -> BottomRight -> BottomLeft -> TopLeft
        framePoints.push(new THREE.Vector3(-hw, -hw, 0));
        framePoints.push(new THREE.Vector3(hw, -hw, 0));
        framePoints.push(new THREE.Vector3(hw, hw, 0));
        framePoints.push(new THREE.Vector3(-hw, hw, 0));
        framePoints.push(new THREE.Vector3(-hw, -hw, 0));
        const frameGeometry = new THREE.BufferGeometry().setFromPoints(framePoints);

        // Create longitudinal lines (connecting depth)
        // We'll just add lines that go from z=0 to z=-length for each corner in the Segment object logic

        class Segment {
            constructor(zPos, index) {
                this.zPos = zPos;
                this.index = index;
                this.meshGroup = new THREE.Group();
                this.meshGroup.position.z = zPos;

                // 1. The Square Frame
                this.frame = new THREE.Line(frameGeometry, materialLine);
                this.meshGroup.add(this.frame);

                // 2. Longitudinal Lines (Connecting to next segment)
                // We create 4 lines going continuously.
                // Actually, if we just place lines along Z, it's easier.
                // Let's add 4 distinct lines for the "corners" that span exactly length length
                // But simple square frames spaced out create a "grid" look if we also have longitudinal lines.
                // I'll add the longitudinal lines to THIS segment extending to the NEXT.
                const connectorPoints = [];
                const d = CONFIG.tunnelLength;

                // 4 Lines
                [
                    [-hw, -hw], [hw, -hw], [hw, hw], [-hw, hw]
                ].forEach(([x, y]) => {
                    const pts = [
                        new THREE.Vector3(x, y, 0),
                        new THREE.Vector3(x, y, -d)
                    ];
                    // We need a unique geometry for lines to work well as segments
                    const geo = new THREE.BufferGeometry().setFromPoints(pts);
                    const line = new THREE.Line(geo, materialLine);
                    this.meshGroup.add(line);
                });

                // 3. Content (Images on walls)
                // Randomly decide if this segment has an image and on which wall
                this.hasContent = Math.random() > 0.4; // 60% chance of content
                if (this.hasContent) {
                    const texture = textures[Math.floor(Math.random() * textures.length)];
                    const aspect = 512 / 768; // 0.66
                    const height = CONFIG.imageScale;
                    const width = height * aspect;

                    const planeGeo = new THREE.PlaneGeometry(width, height);
                    const planeMat = new THREE.MeshBasicMaterial({
                        map: texture,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0
                    });

                    this.contentMesh = new THREE.Mesh(planeGeo, planeMat);

                    // Pick a random wall: 0=Bottom, 1=Right, 2=Top, 3=Left
                    // In reference image: images are on all sides
                    const wall = Math.floor(Math.random() * 4);
                    const offset = hw; // Distance from center to wall

                    // Align mesh to wall
                    // Wall 0 (Bottom): y = -offset, facing up/in? 
                    // Let's place them slightly "embedded" or floating near grid
                    switch (wall) {
                        case 0: // Bottom
                            this.contentMesh.position.y = -offset;
                            this.contentMesh.rotation.x = -Math.PI / 2;
                            // Add some random offset on the "width" of the wall
                            this.contentMesh.position.x = (Math.random() - 0.5) * (CONFIG.tunnelSize - 2);
                            break;
                        case 1: // Right
                            this.contentMesh.position.x = offset;
                            this.contentMesh.rotation.y = -Math.PI / 2;
                            this.contentMesh.position.y = (Math.random() - 0.5) * (CONFIG.tunnelSize - 2);
                            break;
                        case 2: // Top
                            this.contentMesh.position.y = offset;
                            this.contentMesh.rotation.x = Math.PI / 2;
                            this.contentMesh.position.x = (Math.random() - 0.5) * (CONFIG.tunnelSize - 2);
                            break;
                        case 3: // Left
                            this.contentMesh.position.x = -offset;
                            this.contentMesh.rotation.y = Math.PI / 2;
                            this.contentMesh.position.y = (Math.random() - 0.5) * (CONFIG.tunnelSize - 2);
                            break;
                    }

                    // Center the image in the depths of the segment
                    this.contentMesh.position.z = -CONFIG.tunnelLength / 2;

                    this.meshGroup.add(this.contentMesh);
                }

                tunnelGroup.add(this.meshGroup);
            }

            setPosition(z) {
                this.zPos = z;
                this.meshGroup.position.z = z;
            }
        }

        const segments = [];
        // Create initial segments
        // We want them starting from slightly behind camera to far ahead
        // Camera starts at 0.
        // Let's place segments from z=0 to z = -segments * length
        for (let i = 0; i < CONFIG.segments; i++) {
            const z = -i * CONFIG.tunnelLength;
            segments.push(new Segment(z, i));
        }


        // --- EVENTS ---

        let targetScroll = 0;
        let actualScroll = 0;

        window.addEventListener('wheel', (e) => {
            // e.deltaY is usually positive for scrolling down (pulling content up)
            // We want "scroll down" to mean "move forward into tunnel" (Z decreases)
            targetScroll -= e.deltaY * CONFIG.scrollMultiplier;
        });

        window.addEventListener('mousemove', (e) => {
            // Normalize mouse position to -1 to 1
            state.targetMouseX = (e.clientX / window.innerWidth) * 2 - 1;
            state.targetMouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Touch support for mobile
        let touchStart = 0;
        window.addEventListener('touchstart', (e) => {
            touchStart = e.touches[0].clientY;
        });
        window.addEventListener('touchmove', (e) => {
            const touchY = e.touches[0].clientY;
            const delta = touchStart - touchY;
            targetScroll -= delta * CONFIG.scrollMultiplier * 2;
            touchStart = touchY;
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            // Smooth scroll damping
            actualScroll += (targetScroll - actualScroll) * 0.1;

            // Update camera Z
            camera.position.z = actualScroll;

            // Camera remains fixed in X/Y and Rotation Z like a static grid structure where only depth moves
            camera.rotation.z = 0;
            camera.position.x = 0;
            camera.position.y = 0;

            // Infinite Tunnel Logic (Leapfrogging)
            // Calculate which segment index should be at the "front" relative to camera
            // Segment 0 is at 0. Segment 1 is at -length. etc.
            // If camera is at -100. We need segments around -100.

            // Current "head" of the tunnel (the part closest to positive infinity) relative to camera
            // We want segments to cover [camera.z + buffer, camera.z - far_clip]
            // Segments are initially at 0, -8, -16...

            const segmentLength = CONFIG.tunnelLength;
            const totalLength = CONFIG.segments * segmentLength;

            // Calculate a localized index based on scroll
            // As we move negative Z, we are moving "forward" in my setup logic? 
            // Wait, standard OpenGL: Camera looks down -Z.
            // So moving "forward" means Z decreases (goes negative).

            segments.forEach(segment => {
                // Get world Z (segment.zPos is static? No we should re-position them)
                // Let's treat the segments as a sliding window.

                // Position relative to camera
                // We want the segment to be in front of the camera (negative z relative to camera)
                // But also some behind (positive z relative to camera) to avoid clipping when rotation happens

                // If segment is too far BEHIND camera (z > camera.z + padding)
                // Move it to the far FRONT (z < camera.z - viewDistance)
                // But wait, we are moving in -Z. So "Behind" is +Z. "Front" is -Z.
                // If segment.z > camera.z + offset, move it to segment.z - totalLength

                // Let's allow dynamic repositioning

                // We initially placed them at 0, -8, -16...
                // If camera is at -50.
                // Segment at 0 is at +50 relative. Too far behind.
                // Move it to -50 - (length of others)

                let relZ = segment.meshGroup.position.z - camera.position.z;

                // If segment is significantly behind the camera (positive Z distance)
                // Move it to the front
                while (relZ > segmentLength * 2) {
                    segment.meshGroup.position.z -= totalLength;
                    relZ -= totalLength;
                }

                // If segment is too far ahead (negative Z distance) (e.g. if we scroll backwards)
                while (relZ < -totalLength + segmentLength * 2) {
                    segment.meshGroup.position.z += totalLength;
                    relZ += totalLength;
                }
            });

            // Update opacity of images based on distance for smooth "time by time" appearance
            segments.forEach(segment => {
                if (segment.hasContent && segment.contentMesh) {
                    // Distance from camera
                    const dist = Math.abs(segment.meshGroup.position.z - camera.position.z);
                    const viewRange = 60; // How far we can see clearly
                    // Opacity logic: 
                    // Near camera: Opacity 1
                    // Far camera: Opacity 0
                    let opacity = 1 - (dist / viewRange);
                    opacity = Math.max(0, Math.min(1, opacity));

                    // Make it fade in more dramatically "time by time"
                    // We want them to be invisible until they are relatively close, then fade in smoothly
                    // Let's us a power curve
                    opacity = Math.pow(opacity, 3);

                    segment.contentMesh.material.opacity = opacity;
                }
            });

            renderer.render(scene, camera);
        }

        // --- INIT ---
        // Hide loader
        document.getElementById('loader').style.opacity = 0;
        setTimeout(() => document.getElementById('loader').remove(), 500);

        animate();

    </script>
</body>

</html>
